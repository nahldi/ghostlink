<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#08080f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>GhostLink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  </head>
  <body>
    <div id="root">
      <div id="loading-fallback" style="display:flex;align-items:center;justify-content:center;min-height:100dvh;min-height:100vh;background:#08080f;color:#e0dff0;font-family:Inter,system-ui,sans-serif;flex-direction:column;gap:16px">
        <div style="width:44px;height:44px;border:2px solid rgba(167,139,250,0.3);border-top-color:#a78bfa;border-radius:50%;animation:spin 0.8s linear infinite"></div>
        <div style="font-size:13px;opacity:0.4;font-weight:500">GhostLink</div>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
