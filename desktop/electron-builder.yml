appId: com.ghostlink.app
productName: GhostLink
directories:
  output: dist
  buildResources: assets
files:
  - main/**/*.js
  - main/**/*.js.map
  - renderer/**
  - "!**/*.ts"
extraResources:
  - from: ../backend
    to: backend
    filter:
      - "**/*"
      - "!__pycache__/**"
      - "!data/**"
      - "!uploads/**"
      - "!*.pyc"
  - from: ../frontend/dist
    to: frontend
  - from: assets
    to: assets
    filter:
      - "*.png"
      - "*.ico"
win:
  target: nsis
  icon: assets/icon.ico
  signAndEditExecutable: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowSilentUpdate: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "GhostLink-Setup-${version}.${ext}"
  include: assets/uninstaller.nsh
mac:
  target: dmg
  icon: assets/icon.icns
  category: public.app-category.developer-tools
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
linux:
  target:
    - AppImage
    - deb
  icon: assets/icon.png
  category: Development
publish:
  provider: github
  owner: nahldi
  repo: ghostlink
