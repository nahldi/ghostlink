name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build desktop
        working-directory: desktop
        run: |
          npm ci
          npx tsc
          npx electron-builder --win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-installer
          path: |
            desktop/dist/*.exe
            desktop/dist/*.blockmap
            desktop/dist/latest.yml

  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build desktop
        working-directory: desktop
        run: |
          npm ci
          npx tsc
          npx electron-builder --linux AppImage deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-installer
          path: |
            desktop/dist/*.AppImage
            desktop/dist/*.deb
            desktop/dist/latest-linux.yml

  build-mac:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          package-manager-cache: false

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build desktop
        working-directory: desktop
        run: |
          npm ci
          npx tsc
          npx electron-builder --mac dmg

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mac-installer
          path: |
            desktop/dist/*.dmg
            desktop/dist/latest-mac.yml

  release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run download ${{ github.run_id }} --dir artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -d '' files < <(find artifacts -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No artifacts downloaded for release"
            exit 1
          fi
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${files[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${files[@]}" --generate-notes --verify-tag
          fi
